  <!-- 音乐播放器控制脚本 -->
  <script>
    ap = null
    Object.defineProperty(document.querySelector('meting-js'),"aplayer",{
        set: function(aplayer) {
            ap=aplayer
            ready();
        }
    });
    isRecover = false;
    function ready(){
        ap.on('canplay', function () {
            if(!isRecover){
                if(localStorage.getItem("musicIndex") != null){
                    musicIndex = localStorage.getItem("musicIndex");
                    musicTime = localStorage.getItem("musicTime");
                    if(ap.list.index != musicIndex){
                        ap.list.switch(musicIndex);
                    }else{
                        ap.seek(musicTime);
                        ap.play();
                        localStorage.clear();
                        isRecover = true;
                    }
                }else{
                    isRecover = true;
                }
            }
        });
    }
    window.onbeforeunload = function(event) {
        if(!ap.audio.paused){
            musicIndex = ap.list.index;
            musicTime = ap.audio.currentTime;
            localStorage.setItem("musicIndex",musicIndex);
            localStorage.setItem("musicTime",musicTime);
        }
    };

  <script>
    function scrollToContent() {
      // 获取主要内容区域
      const mainContent = document.querySelector('.main');
      let targetPosition;

      if (mainContent) {
        // 计算主要内容区域的精确位置
        const rect = mainContent.getBoundingClientRect();
        targetPosition = window.scrollY + rect.top;
      } else {
        // 如果找不到主要内容，滚动到视口高度的位置
        targetPosition = window.innerHeight;
      }

      // 使用 anime.js 实现更丝滑的滚动动画
      window.anime({
        targets: document.scrollingElement,
        scrollTop: targetPosition,
        duration: 1200, // 增加持续时间让动画更优雅
        easing: 'easeOutCubic', // 使用三次贝塞尔缓动函数，开始快结束慢
        complete: function() {
          // 动画完成后的回调，可以添加其他效果
          console.log('Scroll animation completed');
        }
      });
    }
  </script>

  <!-- GSAP 文章块动画 - 仅在首页生效 -->

  <script>
    // 关于页面专用动画
    document.addEventListener('DOMContentLoaded', function() {
      // 检查是否在关于页面
      const aboutContainer = document.querySelector('.about-container');
      if (!aboutContainer) return;

      // 注册 ScrollTrigger 插件
      gsap.registerPlugin(ScrollTrigger);

      // 初始化关于页面动画
      function initAboutPageAnimations() {
        // 1. 个人简介区域动画
        const aboutHero = document.querySelector('.about-hero');
        if (aboutHero) {
          const avatar = aboutHero.querySelector('.avatar-section');
          const intro = aboutHero.querySelector('.intro-section');

          // 设置初始状态
          gsap.set(aboutHero, { opacity: 0, y: 50 });
          gsap.set(avatar, { scale: 0, rotation: -180 });
          gsap.set(intro, { opacity: 0, x: 50 });

          // 创建时间线动画
          const heroTl = gsap.timeline();

          heroTl
            .to(aboutHero, {
              opacity: 1,
              y: 0,
              duration: 0.8,
              ease: "power2.out"
            })
            .to(avatar, {
              scale: 1,
              rotation: 0,
              duration: 1,
              ease: "back.out(1.7)"
            }, "-=0.4")
            .to(intro, {
              opacity: 1,
              x: 0,
              duration: 0.8,
              ease: "power2.out"
            }, "-=0.6");
        }

        // 2. 技能区域动画
        const skillCategories = document.querySelectorAll('.skills-section .skill-category');
        skillCategories.forEach((category, index) => {
          // 设置初始状态
          gsap.set(category, { opacity: 0, y: 50 });

          // 滚动触发动画
          ScrollTrigger.create({
            trigger: category,
            start: "top 85%",
            onEnter: () => {
              gsap.to(category, {
                opacity: 1,
                y: 0,
                duration: 0.8,
                delay: index * 0.2,
                ease: "power2.out"
              });

              // 技能进度条动画
              const skillBars = category.querySelectorAll('.skill-progress');
              skillBars.forEach((bar, barIndex) => {
                const progress = bar.getAttribute('data-progress');
                gsap.to(bar, {
                  width: progress + '%',
                  duration: 1.5,
                  delay: 0.5 + barIndex * 0.1,
                  ease: "power2.out"
                });
              });
            }
          });
        });

        // 3. 时间线动画
        const timelineItems = document.querySelectorAll('.timeline-item');
        if (timelineItems.length > 0) {
          timelineItems.forEach((item, index) => {
            const marker = item.querySelector('.timeline-marker');
            const content = item.querySelector('.timeline-content');

            // 设置初始状态
            gsap.set(marker, { scale: 0, opacity: 0 });
            gsap.set(content, { opacity: 0, x: 50 });

            // 滚动触发动画
            ScrollTrigger.create({
              trigger: item,
              start: "top 85%",
              onEnter: () => {
                const tl = gsap.timeline();

                tl
                  .to(marker, {
                    scale: 1,
                    opacity: 1,
                    duration: 0.5,
                    ease: "back.out(1.7)"
                  })
                  .to(content, {
                    opacity: 1,
                    x: 0,
                    duration: 0.6,
                    ease: "power2.out"
                  }, "-=0.3");
              }
            });
          });
        }

        // 4. 联系方式卡片动画
        const contactItems = document.querySelectorAll('.contact-item');
        if (contactItems.length > 0) {
          // 设置初始状态
          gsap.set(contactItems, {
            opacity: 0,
            y: 40,
            rotationY: -90
          });

          // 滚动触发动画
          ScrollTrigger.create({
            trigger: '.contact-section',
            start: "top 80%",
            onEnter: () => {
              gsap.to(contactItems, {
                opacity: 1,
                y: 0,
                rotationY: 0,
                duration: 0.8,
                ease: "power2.out",
                stagger: 0.2
              });
            }
          });
        }

        // 5. 个人理念区域动画
        const philosophyQuote = document.querySelector('.philosophy-quote');
        const philosophyText = document.querySelector('.philosophy-text');

        if (philosophyQuote || philosophyText) {
          // 设置初始状态
          if (philosophyQuote) gsap.set(philosophyQuote, { opacity: 0, scale: 0.9 });
          if (philosophyText) gsap.set(philosophyText, { opacity: 0, y: 30 });

          // 滚动触发动画
          ScrollTrigger.create({
            trigger: '.philosophy-section',
            start: "top 80%",
            onEnter: () => {
              const tl = gsap.timeline();

              if (philosophyQuote) {
                tl.to(philosophyQuote, {
                  opacity: 1,
                  scale: 1,
                  duration: 0.8,
                  ease: "back.out(1.7)"
                });
              }

              if (philosophyText) {
                tl.to(philosophyText, {
                  opacity: 1,
                  y: 0,
                  duration: 0.6,
                  ease: "power2.out"
                }, "-=0.4");
              }
            }
          });
        }

        // 6. 区域标题动画
        const sectionTitles = document.querySelectorAll('.about-container .section-title');
        sectionTitles.forEach(title => {
          // 设置初始状态
          gsap.set(title, { opacity: 0, y: -30 });

          // 滚动触发动画
          ScrollTrigger.create({
            trigger: title,
            start: "top 90%",
            onEnter: () => {
              gsap.to(title, {
                opacity: 1,
                y: 0,
                duration: 0.6,
                ease: "power2.out"
              });
            }
          });
        });
      }

      // 初始化动画
      initAboutPageAnimations();

      // 监听页面变化（如果使用了 PJAX）
      if (typeof window.pjax !== 'undefined') {
        document.addEventListener('pjax:complete', () => {
          const aboutContainer = document.querySelector('.about-container');
          if (aboutContainer) {
            // 重新初始化ScrollTrigger
            ScrollTrigger.refresh();
            initAboutPageAnimations();
          }
        });
      }
    });
  </script>
